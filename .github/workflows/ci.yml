name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-mingw:
    name: Windows / Qt 6.10.3 / MinGW 13.1
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt and MinGW
        uses: jurplel/install-qt-action@v4
        with:
          # aqtinstall 3.3 cannot resolve Qt 6.11's changed repository layout yet.
          version: 6.10.3
          host: windows
          target: desktop
          arch: win64_mingw
          archives: qtbase qttools
          tools: tools_mingw1310,qt.tools.win64_mingw1310
          cache: true

      - name: Show tool versions
        run: |
          g++ --version
          cmake --version
          ninja --version

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=g++.exe
          -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"

      - name: Build
        run: cmake --build build --parallel
