name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to build and publish (leave empty for build only)
        required: false
        type: string
      qt_version:
        description: Qt version to build with
        required: true
        default: 6.10.3
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: PeekWarden
  # aqtinstall 3.3 cannot resolve Qt 6.11's changed repository layout yet.
  QT_VERSION: ${{ github.event.inputs.qt_version || '6.10.3' }}

jobs:
  windows:
    name: Windows x64 / MinGW 13.1
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_mingw
          archives: qtbase qttools
          tools: tools_mingw1310,qt.tools.win64_mingw1310
          cache: true

      - name: Configure
        shell: pwsh
        run: |
          $qtPrefix = $env:QT_ROOT_DIR

          if (-not $qtPrefix -and $env:Qt6_DIR) {
            $qtPrefix = Split-Path -Parent (Split-Path -Parent (Split-Path -Parent $env:Qt6_DIR))
          }

          if (-not $qtPrefix) {
            throw "Qt install path was not exported by install-qt-action."
          }

          Write-Host "Using Qt prefix: $qtPrefix"

          $cmakeArgs = @(
            "-S", ".",
            "-B", "build",
            "-G", "Ninja",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DCMAKE_CXX_COMPILER=g++.exe",
            "-DCMAKE_PREFIX_PATH=$qtPrefix"
          )

          $cmakeOutput = & cmake @cmakeArgs 2>&1
          $cmakeExitCode = $LASTEXITCODE
          $cmakeOutput | ForEach-Object { Write-Host $_ }

          if ($cmakeExitCode -ne 0) {
            $message = ($cmakeOutput | Select-Object -Last 60) -join "`n"
            $message = $message.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Host "::error title=CMake configure failed::$message"
            exit $cmakeExitCode
          }

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        shell: pwsh
        env:
          REQUESTED_TAG: ${{ github.event.inputs.release_tag }}
          SOURCE_REF_TYPE: ${{ github.ref_type }}
          SOURCE_REF_NAME: ${{ github.ref_name }}
        run: |
          $version = if ($env:REQUESTED_TAG) { $env:REQUESTED_TAG } elseif ($env:SOURCE_REF_TYPE -eq "tag") { $env:SOURCE_REF_NAME } else { "manual" }
          $stage = Join-Path $PWD "dist\${{ env.APP_NAME }}-$version-win64"
          $zip = "$stage.zip"
          $exeCandidates = @(
            (Join-Path $PWD "build\Release\${{ env.APP_NAME }}.exe"),
            (Join-Path $PWD "build\${{ env.APP_NAME }}.exe")
          )
          $translationsCandidates = @(
            (Join-Path $PWD "build\Release\translations"),
            (Join-Path $PWD "build\translations")
          )
          $exe = $exeCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          $translations = $translationsCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1

          if (-not $exe) {
            throw "Built executable was not found."
          }

          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -LiteralPath $exe -Destination $stage
          Copy-Item -LiteralPath LICENSE -Destination $stage
          Copy-Item -LiteralPath README.md -Destination $stage

          if ($translations) {
            Copy-Item -LiteralPath $translations -Destination $stage -Recurse
          }

          windeployqt `
            --release `
            --compiler-runtime `
            --no-system-d3d-compiler `
            --no-opengl-sw `
            (Join-Path $stage "${{ env.APP_NAME }}.exe")

          Compress-Archive -Path "$stage\*" -DestinationPath $zip -Force
          "PACKAGE_PATH=$zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-win64
          path: ${{ env.PACKAGE_PATH }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: ${{ env.PACKAGE_PATH }}
          generate_release_notes: true
